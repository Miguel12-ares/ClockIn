<!DOCTYPE html>
<html>
<head>
    <title>ClockIn - Dashboard</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">ClockIn - {{ user_type|title }}</span>
            <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light">Salir</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h2>Bienvenido</h2>
                <p>Tipo de usuario: <span class="badge bg-info">{{ user_type|title }}</span></p>

                {% if user_type == 'admin' %}
                    <div class="card">
                        <div class="card-header">Panel de Administración</div>
                        <div class="card-body">
                            <p>Funciones administrativas disponibles próximamente.</p>
                        </div>
                    </div>
                {% else %}
                    <div class="card">
                        <div class="card-header">Registro de Asistencia</div>
                        <div class="card-body">
                            <p>Sistema de marcación disponible próximamente.</p>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
